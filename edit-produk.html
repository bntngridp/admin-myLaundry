<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <meta name="description" content="" />
    <meta name="author" content="" />
    <title>Edit Product — myLaundry Admin</title>
    <link href="css/styles.css" rel="stylesheet" />
    <script src="https://use.fontawesome.com/releases/v6.3.0/js/all.js" crossorigin="anonymous"></script>
    <!-- Custom Web Components -->
    <script src="js/components.js" defer></script>
    <style>
        .form-card {
            background-color: #ffffff;
            border-radius: 12px;
            border: 1px solid #f1f5f9;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.02);
            padding: 24px;
            margin-bottom: 24px;
        }
        .form-card h5 {
            color: #0B1739;
            font-weight: 700;
            border-bottom: 1px solid #f1f5f9;
            padding-bottom: 12px;
            margin-bottom: 20px;
        }
        .preview-container {
            text-align: center;
            padding: 16px;
            background-color: #f8fafc;
            border-radius: 8px;
            border: 1px dashed #cbd5e1;
        }
    </style>
</head>
<body class="sb-nav-fixed">
<admin-navbar></admin-navbar>
<div id="layoutSidenav">
    <admin-sidebar></admin-sidebar>
    <div id="layoutSidenav_content">
        <main>
            <div class="container-fluid px-4 py-4">
                <!-- Page Title and Back Button (Clean, Reachable Header UI) -->
                <div class="d-flex align-items-center mb-4">
                    <a href="produk.html" class="btn btn-light d-flex align-items-center justify-content-center me-3" style="width: 40px; height: 40px; border-radius: 50%; border: 1px solid #dee2e6; color: #0B1739; transition: all 0.2s;" title="Back to Products">
                        <i class="fas fa-arrow-left"></i>
                    </a>
                    <h1 class="h3 m-0" style="color: #0B1739; font-weight: 700;">Edit Product</h1>
                </div>

                <div class="row">
                    <!-- Left Column: Product Photo -->
                    <div class="col-md-5 col-12 mb-4">
                        <div class="form-card text-center">
                            <h5>Product Image</h5>
                            <div class="preview-container mb-3">
                                <img src="assets/img/gambar-satu.jpg" alt="Product Photo" class="img-fluid rounded mb-3" id="preview-img" style="max-height: 220px; object-fit: cover;">
                                <div class="text-muted text-truncate mx-auto mb-2" id="file-name-btn" style="max-width: 80%; font-size: 0.85rem;">
                                    gambar-satu.jpg
                                </div>
                            </div>
                            <label class="btn btn-outline-primary" for="file-upload" style="cursor: pointer;">
                                <i class="fas fa-cloud-upload-alt me-1"></i>Upload Photo
                                <input type="file" id="file-upload" accept="image/jpeg,image/png" style="display: none;">
                            </label>
                        </div>
                    </div>

                    <!-- Right Column: Product Details Form -->
                    <div class="col-md-7 col-12 mb-4">
                        <div class="form-card">
                            <h5>Product Information</h5>
                            <form id="edit-product-form">
                                <!-- Category & ID -->
                                <div class="row">
                                    <div class="col-md-6 mb-3">
                                        <label for="kategori" class="form-label">Category</label>
                                        <select class="form-select" id="kategori">
                                            <option value="Wash & Fold" selected>Wash & Fold</option>
                                            <option value="Wash & Iron">Wash & Iron</option>
                                            <option value="Individual Items">Individual Items</option>
                                        </select>
                                    </div>
                                    <div class="col-md-6 mb-3">
                                        <label for="id" class="form-label">Product ID</label>
                                        <input type="text" class="form-control" id="id" value="10001" readonly style="background-color: #f8fafc;">
                                    </div>
                                </div>

                                <!-- Product Name -->
                                <div class="mb-3">
                                    <label for="nama-produk" class="form-label">Product Name</label>
                                    <input type="text" class="form-control" id="nama-produk" value="Wash & Fold Regular">
                                </div>

                                <!-- Estimated Duration -->
                                <h6 class="mt-4 mb-3 text-muted" style="font-size: 0.9rem; font-weight: 600;">Estimated Duration</h6>
                                <div class="row">
                                    <div class="col-sm-6 mb-3">
                                        <label for="satuan-hari" class="form-label">Duration Unit</label>
                                        <select class="form-select" id="satuan-hari">
                                            <option value="days" selected>Days</option>
                                            <option value="hours">Hours</option>
                                        </select>
                                    </div>
                                    <div class="col-sm-6 mb-3">
                                        <label for="jumlah-hari" class="form-label">Amount</label>
                                        <input type="number" class="form-control" id="jumlah-hari" value="2" min="1">
                                    </div>
                                </div>

                                <!-- Price -->
                                <h6 class="mt-4 mb-3 text-muted" style="font-size: 0.9rem; font-weight: 600;">Pricing</h6>
                                <div class="row">
                                    <div class="col-sm-6 mb-3">
                                        <label for="satuan-kg" class="form-label">Pricing Unit</label>
                                        <select class="form-select" id="satuan-kg">
                                            <option value="kg" selected>Per Kilogram (kg)</option>
                                            <option value="pcs">Per Piece (pcs)</option>
                                        </select>
                                    </div>
                                    <div class="col-sm-6 mb-3">
                                        <label for="jumlah-kg" class="form-label">Price (Rp)</label>
                                        <input type="number" class="form-control" id="jumlah-kg" value="6000" min="0">
                                    </div>
                                </div>

                                <!-- Action Buttons -->
                                <div class="d-flex justify-content-end gap-2 mt-4 pt-3" style="border-top: 1px solid #f1f5f9;">
                                    <a href="produk.html" class="btn btn-outline-danger">
                                        <i class="fas fa-times me-1"></i>Cancel
                                    </a>
                                    <button type="submit" class="btn btn-primary">
                                        <i class="fas fa-save me-1"></i>Save Changes
                                    </button>
                                </div>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </main>
        <admin-footer></admin-footer>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js" crossorigin="anonymous"></script>
<script src="js/scripts.js"></script>
<script src="js/api.js"></script>

<script>
    // Handle image upload and preview
    document.getElementById('file-upload').addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (file) {
            document.getElementById('file-name-btn').textContent = file.name;
            const reader = new FileReader();
            reader.onload = function(event) {
                document.getElementById('preview-img').src = event.target.result;
            };
            reader.readAsDataURL(file);
        }
    });

    // Fetch and populate product details
    const urlParams = new URLSearchParams(window.location.search);
    const productId = urlParams.get('id');
    
    if (productId) {
        window.addEventListener('DOMContentLoaded', async () => {
            try {
                const response = await apiFetch(`/services/${productId}`);
                if (response && response.data) {
                    const service = response.data;
                    document.getElementById('id').value = service.id;
                    document.getElementById('nama-produk').value = service.title;
                    document.getElementById('jumlah-kg').value = service.price;

                    // Populate duration
                    if (service.time % 24 === 0) {
                        document.getElementById('satuan-hari').value = 'days';
                        document.getElementById('jumlah-hari').value = service.time / 24;
                    } else {
                        document.getElementById('satuan-hari').value = 'hours';
                        document.getElementById('jumlah-hari').value = service.time;
                    }

                    // Populate pricing unit
                    if (service.category.toLowerCase() === 'kiloan') {
                        document.getElementById('satuan-kg').value = 'kg';
                    } else {
                        document.getElementById('satuan-kg').value = 'pcs';
                    }

                    // Map category dropdown
                    const categorySelect = document.getElementById('kategori');
                    if (service.title.toLowerCase().includes('wash & fold') || service.title.toLowerCase().includes('fold')) {
                        categorySelect.value = 'Wash & Fold';
                    } else if (service.title.toLowerCase().includes('iron')) {
                        categorySelect.value = 'Wash & Iron';
                    } else {
                        categorySelect.value = 'Individual Items';
                    }
                }
            } catch (err) {
                alert('Failed to load product details: ' + err.message);
                window.location.href = 'produk.html';
            }
        });
    }

    // Handle form submit
    document.getElementById('edit-product-form').addEventListener('submit', async function(e) {
        e.preventDefault();
        
        if (!productId) return;

        const titleInput = document.getElementById('nama-produk');
        const priceInput = document.getElementById('jumlah-kg');
        const durationInput = document.getElementById('jumlah-hari');
        const durationUnit = document.getElementById('satuan-hari').value;
        const pricingUnit = document.getElementById('satuan-kg').value;
        
        if (!titleInput || !priceInput || !durationInput) return;

        const title = titleInput.value.trim();
        const price = parseFloat(priceInput.value);
        const amount = parseInt(durationInput.value);

        if (!title || isNaN(price) || isNaN(amount)) {
            alert('Please fill out all required fields correctly!');
            return;
        }

        // Convert duration to hours
        const timeInHours = durationUnit === 'days' ? amount * 24 : amount;

        // Map pricing unit to category name: kg -> Kiloan, pcs -> Satuan
        const category = pricingUnit === 'kg' ? 'Kiloan' : 'Satuan';

        try {
            await apiFetch(`/services/${productId}`, {
                method: 'PUT',
                body: {
                    title: title,
                    time: timeInHours,
                    price: price,
                    category: category
                }
            });
            sessionStorage.setItem('success_message', 'Product updated successfully!');
            window.location.href = 'produk.html';
        } catch (err) {
            alert('Failed to update product: ' + err.message);
        }
    });
</script>
</body>
</html>
