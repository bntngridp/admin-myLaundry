<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <meta name="description" content="" />
    <meta name="author" content="" />
    <title>Edit Product — myLaundry Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/simple-datatables@7.1.2/dist/style.min.css" rel="stylesheet" />
    <link href="css/styles.css" rel="stylesheet" />
    <script src="https://use.fontawesome.com/releases/v6.3.0/js/all.js" crossorigin="anonymous"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Custom Web Components -->
    <script src="js/components.js" defer></script>
</head>
<body class="sb-nav-fixed">
<admin-navbar></admin-navbar>
<div id="layoutSidenav">
        <admin-sidebar></admin-sidebar>
    <div id="layoutSidenav_content">
        <main>
        <div class="container-fluid px-4">
            <div class="wadah">
                <div class="row">
                    <div class="col-md-6">
                        <div class="bagian-gambar">
                            <img src="assets/img/gambar-satu.jpg" alt="Gambar Produk" class="img-fluid">
                            <button class="informasi-nama-gambar btn btn-secondary">11100920201.jpg</button>
                            <br>
                                <button class="button-unggah-gambar btn btn-primary">
                                    Upload Photo
                                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-cloud-upload" viewBox="0 0 16 16">
                                        <path fill-rule="evenodd" d="M4.406 1.342A5.53 5.53 0 0 1 8 0c2.69 0 4.923 2 5.166 4.579C14.758 4.804 16 6.137 16 7.773 16 9.569 14.502 11 12.687 11H10a.5.5 0 0 1 0-1h2.688C13.979 10 15 8.988 15 7.773c0-1.216-1.02-2.228-2.313-2.228h-.5v-.5C12.188 2.825 10.328 1 8 1a4.53 4.53 0 0 0-2.941 1.1c-.757.652-1.153 1.438-1.153 2.055v.448l-.445.049C2.064 4.805 1 5.952 1 7.318 1 8.785 2.23 10 3.781 10H6a.5.5 0 0 1 0 1H3.781C1.708 11 0 9.366 0 7.318c0-1.763 1.266-3.223 2.942-3.593.143-.863.698-1.723 1.464-2.383"/>
                                        <path fill-rule="evenodd" d="M7.646 4.146a.5.5 0 0 1 .708 0l3 3a.5.5 0 0 1-.708.708L8.5 5.707V14.5a.5.5 0 0 1-1 0V5.707L5.354 7.854a.5.5 0 1 1-.708-.708z"/>
                                    </svg>
                                </button>
                        </div>
                    </div>
                    <div class="col-md-6">
                        <div class="form-sec">
                            <form>
                                <div class="bagian-satu">
                                    <h4>General Information</h4>
                                    <div class="mb-3">
                                        <label for="kategori" class="form-label">Category</label>
                                        <input type="text" class="form-control" id="kategori" value="Cuci Lipat">
                                    </div>
                                    <div class="mb-3">
                                        <label for="id" class="form-label">Product ID</label>
                                        <input type="text" class="form-control" id="id" value="10001">
                                    </div>
                                    <div class="mb-3">
                                        <label for="nama-produk" class="form-label">Product Name</label>
                                        <input type="text" class="form-control" id="nama-produk" value="Cuci Lipat Reguler">
                                    </div>
                                </div>
                                <div class="bagian-dua">
                                    <h4>Estimated Duration</h4>
                                    <div class="mb-3">
                                        <label for="satuan-hari" class="form-label">Unit</label>
                                        <input type="text" class="form-control" id="satuan-hari" value="Hari">
                                    </div>
                                    <div class="mb-3">
                                        <label for="jumlah-hari" class="form-label">Amount</label>
                                        <input type="number" class="form-control" id="jumlah-hari" value="3">
                                    </div>
                                </div>
                                <div class="bagian-tiga">
                                    <h4>Price</h4>
                                    <div class="mb-3">
                                        <label for="satuan-kg" class="form-label">Unit</label>
                                        <input type="text" class="form-control" id="satuan-kg" value="Kg">
                                    </div>
                                    <div class="mb-3">
                                        <label for="jumlah-kg" class="form-label">Price per Unit</label>
                                        <input type="number" class="form-control" id="jumlah-kg" value="6">
                                    </div>
                                </div>
                            </form>
                        </div>
                        <div class="action-buttons">
                            <a href="produk.html" type="button" class="button-batal btn btn-danger">
                                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-x-lg" viewBox="0 0 16 16">
                                    <path d="M2.146 2.854a.5.5 0 1 1 .708-.708L8 7.293l5.146-5.147a.5.5 0 0 1 .708.708L8.707 8l5.147 5.146a.5.5 0 0 1-.708.708L8 8.707l-5.146 5.147a.5.5 0 0 1-.708-.708L7.293 8z"/>
                                </svg>
                                Batal</a>
                            <a href="produk.html" type="button" class="button-kirim btn btn-primary">
                                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-send-fill" viewBox="0 0 16 16">
                                    <path d="M15.964.686a.5.5 0 0 0-.65-.65L.767 5.855H.766l-.452.18a.5.5 0 0 0-.082.887l.41.26.001.002 4.995 3.178 3.178 4.995.002.002.26.41a.5.5 0 0 0 .886-.083zm-1.833 1.89L6.637 10.07l-.215-.338a.5.5 0 0 0-.154-.154l-.338-.215 7.494-7.494 1.178-.471z"/>
                                </svg>
                                Submit</a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        </main>
        <admin-footer></admin-footer>
    </div>
</div>
<script src="js/scripts.js"></script>
<script>
window.addEventListener('DOMContentLoaded', event => {
const datatablesSimple = document.getElementById('datatablesSimple');
if (datatablesSimple) {
const dataTable = new simpleDatatables.DataTable(datatablesSimple);

document.getElementById('searchInput').addEventListener('keyup', function() {
dataTable.search(this.value);
            });
        }
    });
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js" crossorigin="anonymous"></script>
<script src="js/scripts.js"></script>
<script src="https://cdn.jsdelivr.net/npm/simple-datatables@7.1.2/dist/umd/simple-datatables.min.js" crossorigin="anonymous"></script>
<script src="js/datatables-simple-demo.js"></script>
</body>
</html>
