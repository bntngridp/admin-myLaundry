<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <meta name="description" content="" />
    <meta name="author" content="" />
    <title>Password Recovery — myLaundry Admin</title>
    <link href="css/styles.css" rel="stylesheet" />
    <script src="https://use.fontawesome.com/releases/v6.3.0/js/all.js" crossorigin="anonymous"></script>
    <!-- Custom Web Components & Styles -->
    <script src="js/components.js" defer></script>
</head>
<body class="bg-login-password-register">
<div id="layoutAuthentication">
    <div id="layoutAuthentication_content">
        <main>
            <div class="container">
                <div class="row justify-content-center">
                    <div class="div-logo">
                        <img class="logo-laundry" src="assets/img/logo-mylaundry.png" alt="">
                    </div>
                    <div class="col-lg-5">
                        <div class="card shadow-lg border-0 rounded-lg mt-5">
                            <div class="card-header"><h3 class="text-password">Password Recovery</h3></div>
                            <div class="card-body">
                                <div id="alert-container"></div>
                                <div class="small mb-3 text-muted">Enter your email address and we will send you a 6-digit OTP code to reset your password.</div>
                                <form id="forgot-form">
                                    <div class="form-floating mb-3">
                                        <input class="form-control" id="inputEmail" type="email" placeholder="name@example.com" />
                                        <label for="inputEmail">Email address</label>
                                    </div>
                                    <div class="d-grid mb-3">
                                        <button type="submit" class="btn btn-primary" id="btn-submit">Send OTP Code</button>
                                    </div>
                                    <div class="text-center">
                                        <a class="small" href="login.html">← Back to Sign In</a>
                                    </div>
                                </form>
                            </div>
                            <div class="card-footer text-center py-3">
                                <div class="small"><a href="register.html">Already have an account? Sign in!</a></div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>
    <div id="layoutAuthentication_footer">
        <footer class="py-4 mt-auto">
            <div class="container-fluid px-4">
                <div class="d-flex align-items-center justify-content-between small">
                    <div class="text-muted">Copyright &copy; myLaundry 2024</div>
                    <div>
                        <a href="#">Privacy Policy</a>
                        &middot;
                        <a href="#">Terms &amp; Conditions</a>
                    </div>
                </div>
            </div>
        </footer>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js" crossorigin="anonymous"></script>
<script src="js/scripts.js"></script>
<script>
    window.addEventListener('DOMContentLoaded', () => {
        const form = document.getElementById('forgot-form');
        const emailInput = document.getElementById('inputEmail');
        const alertContainer = document.getElementById('alert-container');
        const submitBtn = document.getElementById('btn-submit');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = emailInput.value.trim();

            if (!email) {
                showAlert('Email address is required!', 'danger');
                return;
            }

            submitBtn.disabled = true;
            submitBtn.innerHTML = '<span class="spinner-border spinner-border-sm me-2" role="status" aria-hidden="true"></span>Sending OTP...';
            alertContainer.innerHTML = '';

            try {
                const response = await apiFetch('/auth/forgot-password', {
                    method: 'POST',
                    body: { email }
                });

                showAlert('OTP code sent successfully! Redirecting...', 'success');
                setTimeout(() => {
                    window.location.href = `reset-password.html?email=${encodeURIComponent(email)}`;
                }, 2000);
            } catch (err) {
                showAlert(err.message, 'danger');
                submitBtn.disabled = false;
                submitBtn.innerHTML = 'Send OTP Code';
            }
        });

        function showAlert(message, type) {
            alertContainer.innerHTML = `
                <div class="alert alert-${type} alert-dismissible fade show" role="alert" style="border-radius: 12px; font-size: 0.9rem;">
                    ${message}
                    <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                </div>
            `;
        }
    });
</script>
</body>
</html>
