<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <meta name="description" content="" />
    <meta name="author" content="" />
    <title>Orders — myLaundry Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/simple-datatables@7.1.2/dist/style.min.css" rel="stylesheet" />
    <link href="css/styles.css" rel="stylesheet" />
    <link href="css/custom-components.css" rel="stylesheet" />
    <script src="https://use.fontawesome.com/releases/v6.3.0/js/all.js" crossorigin="anonymous"></script>
    <!-- Custom Web Components -->
    <script src="js/components.js" defer></script>
</head>
<body class="sb-nav-fixed">
<admin-navbar></admin-navbar>
<div id="layoutSidenav">
        <admin-sidebar></admin-sidebar>        
            <div id="layoutSidenav_content">
                <main>
                    <div class="container-fluid px-4">
                        <h1 class="mt-4">Orders</h1>
                        <div class="card mb-4">
                            <div class="card mb-4">
                                <div class="card-header">
                                    <i class="fas fa-table me-1"></i>
                                    Today's Orders
                                </div>
                                <div class="card-body">
                                    <table id="datatablesSimple" style="font-size: 13px">
                                        <thead>
                                        <tr>
                                            <th>Order</th>
                                            <th>Customer</th>
                                            <th>Date</th>
                                            <th>Status</th>
                                            <th>Address</th>
                                            <th>Total</th>
                                            <th></th>
                                        </tr>
                                        </thead>
                                        <tfoot>
                                        <tr>
                                            <th>Order</th>
                                            <th>Customer</th>
                                            <th>Date</th>
                                            <th>Status</th>
                                            <th>Address</th>
                                            <th>Total</th>
                                            <th></th>
                                        </tr>
                                        </tfoot>
                                        <tbody id="ordersTableBody">
                                        <tr>
                                            <td colspan="7" class="text-center py-5 text-muted">
                                                <div class="d-flex flex-column align-items-center justify-content-center gap-2">
                                                    <div class="spinner-border text-primary spinner-border-sm" role="status">
                                                        <span class="visually-hidden">Loading...</span>
                                                    </div>
                                                    <span>Memuat data pesanan...</span>
                                                </div>
                                            </td>
                                        </tr>
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div>
                </main>
                <admin-footer></admin-footer>
            </div>
        </div>
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js" crossorigin="anonymous"></script>
        <script src="js/scripts.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/simple-datatables@7.1.2/dist/umd/simple-datatables.min.js" crossorigin="anonymous"></script>
        <script src="js/api.js"></script>
        <script>
            // Status Mappers for Style Badges
            const statusClasses = {
                'awaiting payment': 'menunggu-pembayaran',
                'pending': 'menunggu-pembayaran',
                'courier en route': 'kurir-dalam-perjalanan',
                'arrived': 'kurir-dalam-perjalanan',
                'in progress': 'kurir-dalam-perjalanan',
                'completed': 'selesai',
                'done': 'selesai',
                'cancelled': 'dibatalkan'
            };

            function getStatusClass(status) {
                const key = (status || '').toLowerCase();
                return statusClasses[key] || 'menunggu-pembayaran';
            }

            function getStatusLabel(status) {
                if (!status) return 'Awaiting Payment';
                if (status.toLowerCase() === 'completed' || status.toLowerCase() === 'done') return 'Completed';
                if (status.toLowerCase() === 'cancelled') return 'Cancelled';
                return status.split(' ').map(w => w.charAt(0).toUpperCase() + w.slice(1)).join(' ');
            }

            // Fetch and load orders
            async function loadOrders() {
                const tbody = document.getElementById('ordersTableBody');
                if (!tbody) return;

                try {
                    const response = await apiFetch('/orders/');
                    if (!response || !response.success) {
                        throw new Error('Gagal mengambil data pesanan dari API.');
                    }

                    const orders = response.data || [];
                    
                    // Filter out completed and cancelled orders for active list
                    const activeOrders = orders.filter(order => {
                        const status = (order.status || '').toLowerCase();
                        return status !== 'done' && status !== 'completed' && status !== 'cancelled';
                    });

                    tbody.innerHTML = '';
                    if (activeOrders.length > 0) {
                        // Sort orders by ID descending (newest first)
                        const sortedOrders = [...activeOrders].sort((a, b) => b.id - a.id);
                        
                        sortedOrders.forEach(order => {
                            const row = document.createElement('tr');
                            
                            const dateObj = new Date(order.created_at);
                            const options = { month: 'short', day: 'numeric', year: 'numeric', hour: '2-digit', minute: '2-digit', hour12: false };
                            const formattedDate = dateObj.toLocaleDateString('en-US', options).replace(',', '');
                            
                            const customerName = order.customer ? (order.customer.username || 'Guest') : 'Guest';
                            const customerEmail = order.customer ? (order.customer.email || '') : '';
                            const addressText = order.address && order.address.street_name ? 
                                `${order.address.receiver_name}, ${order.address.street_name}` : 'No Address';
                            
                            const priceVal = order.total_price || 0;
                            const formattedTotal = new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR', minimumFractionDigits: 0 }).format(priceVal);
                            
                            const statusLabel = getStatusLabel(order.status);
                            const statusClass = getStatusClass(order.status);

                            row.innerHTML = `
                                <td>#${order.id}</td>
                                <td>
                                    ${customerName} <br> <small class="text-muted">${customerEmail}</small>
                                </td>
                                <td>${formattedDate}</td>
                                <td><span class="status-pesanan-dashbord ${statusClass}">${statusLabel}</span></td>
                                <td>${addressText}</td>
                                <td>${formattedTotal}</td>
                                <td><a href="detail-pesanan.html?id=${order.id}" class="details-btn btn btn-primary btn-sm">View Details</a></td>
                            `;
                            tbody.appendChild(row);
                        });
                    } else {
                        tbody.innerHTML = `
                            <tr>
                                <td colspan="7" class="text-center py-5 text-muted">
                                    <div class="d-flex flex-column align-items-center justify-content-center gap-2">
                                        <i class="fas fa-shopping-basket fa-3x mb-2" style="color: #dee2e6;"></i>
                                        <h5 class="fw-bold" style="color: #6c757d;">Tidak Ada Pesanan Aktif</h5>
                                        <p class="text-muted small mb-0">Semua pesanan baru yang sedang diproses akan muncul di sini.</p>
                                    </div>
                                </td>
                            </tr>
                        `;
                    }

                    // Initialize Simple DataTable only if there is data
                    if (activeOrders.length > 0) {
                        const datatablesSimple = document.getElementById('datatablesSimple');
                        if (datatablesSimple && !datatablesSimple.classList.contains('dataTable-table')) {
                            new simpleDatatables.DataTable(datatablesSimple);
                        }
                    }

                } catch (error) {
                    console.error('Error loading orders:', error);
                    tbody.innerHTML = `
                        <tr>
                            <td colspan="7" class="text-center py-5 text-danger">
                                <div class="d-flex flex-column align-items-center justify-content-center gap-2">
                                    <i class="fas fa-exclamation-circle fa-3x mb-2" style="color: #dc3545;"></i>
                                    <h5 class="fw-bold">Gagal Memuat Data</h5>
                                    <p class="small mb-0">${error.message || 'Koneksi ke server terputus. Silakan coba lagi.'}</p>
                                    <button onclick="loadOrders()" class="btn btn-outline-danger btn-sm mt-2">Coba Lagi</button>
                                </div>
                            </td>
                        </tr>
                    `;
                }
            }

            window.addEventListener('DOMContentLoaded', loadOrders);
        </script>
    </body>
</html>
