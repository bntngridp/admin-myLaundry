<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <meta name="description" content="" />
    <meta name="author" content="" />
    <title>Order Details — myLaundry Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/simple-datatables@7.1.2/dist/style.min.css" rel="stylesheet" />
    <link href="css/styles.css" rel="stylesheet" />
    <script src="https://use.fontawesome.com/releases/v6.3.0/js/all.js" crossorigin="anonymous"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Custom Web Components -->
    <script src="js/components.js" defer></script>
</head>
<body class="sb-nav-fixed">
<admin-navbar></admin-navbar>
<div id="layoutSidenav">
        <admin-sidebar></admin-sidebar>
    <div id="layoutSidenav_content">
        <main>
            <div class="wadah">
                <div class="header-detail-pesanan">
                    <h3>Order Details</h3>
                    <a href="pesanan.html" class="btn-exit">Close
                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-x-lg" viewBox="0 0 16 16">
                            <path d="M2.146 2.854a.5.5 0 1 1 .708-.708L8 7.293l5.146-5.147a.5.5 0 0 1 .708.708L8.707 8l5.147 5.146a.5.5 0 0 1-.708.708L8 8.707l-5.146 5.147a.5.5 0 0 1-.708-.708L7.293 8z"/>
                        </svg>
                    </a>
                </div>
                <div class="penampung   ">
                    <div class="bagian-satu">
                        <h4>General Information</h4>
                        <div class="control-group">
                            <label>Order Number</label>
                            <input type="text" value="#1532" readonly>
                        </div>
                        <div class="control-group">
                            <label>Customer</label>
                            <input type="text" value="Andi Manda" readonly>
                        </div>
                        <div class="control-group">
                            <label>Date</label>
                            <input type="text" value="15/7/2024" readonly>
                        </div>
                        <div class="control-group">
                            <label>Address</label>
                            <textarea readonly>Jl. Telekomunikasi 1, Terusan Buahbatu - Bojongsoang, Telkom University, Sukapura, Kec. Dayeuhkolot, Kabupaten Bandung, Jawa Barat 40257</textarea>
                        </div>
                        <div class="control-group">
                            <label>Status</label>
                            <input type="text" value="Courier En Route" readonly class="status">
                        </div>
                    </div>
                    <div class="bagian-dua">
                        <h4>Payment</h4>
                        <div class="control-group">
                            <label>Payment Method</label>
                            <input type="text" value="Mandiri Virtual Account" readonly>
                        </div>
                        <div class="control-group">
                            <label>Amount</label>
                            <input type="text" value="Rp70.000,00" readonly>
                        </div>
                    </div>
                    <div class="bagian-tiga">
                        <h4>Order Items</h4>
                        <div class="control-group">
                            <label>Item List</label>
                            <ol>
                                <li>Wash & Fold Regular 8 kg</li>
                                <li>Sheet (Single)</li>
                                <li>Suit Jacket</li>
                            </ol>
                        </div>
                        <div class="control-group">
                            <label>Notes</label>
                            <textarea readonly>Please separate white clothes from colored ones</textarea>
                        </div>
                    </div>
                </div>
            </div>
        </main>
        <admin-footer></admin-footer>
    </div>
</div>
<script src="script.js"></script>
<script>
    window.addEventListener('DOMContentLoaded', event => {
        const datatablesSimple = document.getElementById('datatablesSimple');
        if (datatablesSimple) {
            const dataTable = new simpleDatatables.DataTable(datatablesSimple);

            document.getElementById('searchInput').addEventListener('keyup', function() {
                dataTable.search(this.value);
            });
        }
    });
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js" crossorigin="anonymous"></script>
<script src="js/scripts.js"></script>
<script src="https://cdn.jsdelivr.net/npm/simple-datatables@7.1.2/dist/umd/simple-datatables.min.js" crossorigin="anonymous"></script>
<script src="js/datatables-simple-demo.js"></script>
</body>
</html>
