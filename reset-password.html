<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <meta name="description" content="" />
    <meta name="author" content="" />
    <title>Reset Password — myLaundry Admin</title>
    <link href="css/styles.css" rel="stylesheet" />
    <script src="https://use.fontawesome.com/releases/v6.3.0/js/all.js" crossorigin="anonymous"></script>
    <!-- Custom Web Components & Styles -->
    <script src="js/components.js?v=1.0.1" defer></script>
</head>
<body class="bg-login-password-register">
<div id="layoutAuthentication">
    <div id="layoutAuthentication_content">
        <main>
            <div class="container">
                <div class="row justify-content-center">
                    <div class="div-logo">
                        <img class="logo-laundry" src="assets/img/logo-mylaundry.png" alt="">
                    </div>
                    <div class="col-lg-6">
                        <div class="card shadow-lg border-0 rounded-lg mt-5">
                            <div class="card-header"><h3 class="text-password">Reset Password</h3></div>
                            <div class="card-body">
                                <div id="alert-container"></div>
                                <form id="reset-form">
                                    <!-- Read-only Email Field -->
                                    <div class="form-floating mb-3">
                                        <input class="form-control" id="inputEmail" type="email" placeholder="name@example.com" readonly />
                                        <label for="inputEmail">Email address</label>
                                    </div>
                                    
                                    <!-- Step 1: OTP Verification Section -->
                                    <div id="otp-section">
                                        <div class="form-floating mb-3">
                                            <input class="form-control" id="inputOTP" type="text" maxlength="6" placeholder="Enter 6-digit OTP" />
                                            <label for="inputOTP">6-Digit OTP Code</label>
                                        </div>
                                        <div class="d-grid mb-3">
                                            <button type="button" class="btn btn-primary btn-block" id="btn-verify-otp">Verify OTP</button>
                                        </div>
                                    </div>

                                    <!-- Step 2: New Password Section (Initially Hidden) -->
                                    <div id="password-section" style="display: none;">
                                        <div class="row mb-3">
                                            <div class="col-md-6">
                                                <div class="form-floating mb-3 mb-md-0">
                                                    <input class="form-control" id="inputPassword" type="password" placeholder="Create a password" />
                                                    <label for="inputPassword">New Password</label>
                                                </div>
                                                <div class="password-requirements mt-2 text-muted px-2" style="font-size: 0.8rem; display: none;">
                                                    <div class="req-item mb-1" id="req-len"><span class="icon-container me-1"></span>Min. 8 characters</div>
                                                    <div class="req-item mb-1" id="req-upper"><span class="icon-container me-1"></span>Min. 1 uppercase (A-Z)</div>
                                                    <div class="req-item mb-1" id="req-lower"><span class="icon-container me-1"></span>Min. 1 lowercase (a-z)</div>
                                                    <div class="req-item mb-1" id="req-num"><span class="icon-container me-1"></span>Min. 1 number (0-9)</div>
                                                    <div class="req-item mb-1" id="req-special"><span class="icon-container me-1"></span>Min. 1 symbol (e.g. !, @, #)</div>
                                                </div>
                                            </div>
                                            <div class="col-md-6">
                                                <div class="form-floating mb-3 mb-md-0">
                                                    <input class="form-control" id="inputPasswordConfirm" type="password" placeholder="Confirm password" />
                                                    <label for="inputPasswordConfirm">Confirm New Password</label>
                                                </div>
                                            </div>
                                        </div>
                                        <div class="d-grid">
                                            <button type="submit" class="btn btn-success btn-block" id="btn-reset-password">Reset Password</button>
                                        </div>
                                    </div>
                                </form>
                            </div>
                            <div class="card-footer text-center py-3">
                                <div class="small"><a href="login.html">Back to Sign In</a></div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>
    <div id="layoutAuthentication_footer">
        <footer class="py-4 mt-auto">
            <div class="container-fluid px-4">
                <div class="d-flex align-items-center justify-content-between small">
                    <div class="text-muted">Copyright &copy; myLaundry 2024</div>
                    <div>
                        <a href="#">Privacy Policy</a>
                        &middot;
                        <a href="#">Terms &amp; Conditions</a>
                    </div>
                </div>
            </div>
        </footer>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js" crossorigin="anonymous"></script>
<script src="js/scripts.js"></script>
<script>
    window.addEventListener('DOMContentLoaded', () => {
        // Parse email from URL query params
        const urlParams = new URLSearchParams(window.location.search);
        const email = urlParams.get('email') || '';
        
        const emailInput = document.getElementById('inputEmail');
        emailInput.value = email;

        // Redirect if email is not present in URL
        if (!email) {
            window.location.replace('password.html');
            return;
        }

        const otpInput = document.getElementById('inputOTP');
        const verifyOtpBtn = document.getElementById('btn-verify-otp');
        const otpSection = document.getElementById('otp-section');
        
        const passwordSection = document.getElementById('password-section');
        const passwordInput = document.getElementById('inputPassword');
        const confirmInput = document.getElementById('inputPasswordConfirm');
        const resetPasswordBtn = document.getElementById('btn-reset-password');
        
        const requirementsContainer = document.querySelector('.password-requirements');
        const alertContainer = document.getElementById('alert-container');
        const form = document.getElementById('reset-form');

        const reqs = {
            len: document.getElementById('req-len'),
            upper: document.getElementById('req-upper'),
            lower: document.getElementById('req-lower'),
            num: document.getElementById('req-num'),
            special: document.getElementById('req-special')
        };

        const CROSS_SVG = `<svg class="text-danger" width="14" height="14" fill="currentColor" viewBox="0 0 16 16" style="vertical-align: -0.125em;"><path d="M16 8A8 8 0 1 1 0 8a8 8 0 0 1 16 0zM5.354 4.646a.5.5 0 1 0-.708.708L7.293 8l-2.647 2.646a.5.5 0 0 0 .708.708L8 8.707l2.646 2.647a.5.5 0 0 0 .708-.708L8.707 8l2.647-2.646a.5.5 0 0 0-.708-.708L8 7.293 5.354 4.646z"/></svg>`;
        const CHECK_SVG = `<svg class="text-success" width="14" height="14" fill="currentColor" viewBox="0 0 16 16" style="vertical-align: -0.125em;"><path d="M16 8A8 8 0 1 1 0 8a8 8 0 0 1 16 0zm-3.97-3.03a.75.75 0 0 0-1.08.022L7.477 9.417 5.384 7.323a.75.75 0 0 0-1.06 1.06L6.97 11.03a.75.75 0 0 0 1.079-.02l3.992-4.99a.75.75 0 0 0-.01-1.05z"/></svg>`;

        // Initialize icons
        Object.values(reqs).forEach(el => {
            const iconContainer = el.querySelector('.icon-container');
            if (iconContainer) iconContainer.innerHTML = CROSS_SVG;
        });

        function updateReq(element, isValid) {
            const iconContainer = element.querySelector('.icon-container');
            if (iconContainer) {
                if (isValid) {
                    iconContainer.innerHTML = CHECK_SVG;
                    element.classList.remove('text-muted');
                    element.classList.add('text-success');
                } else {
                    iconContainer.innerHTML = CROSS_SVG;
                    element.classList.remove('text-success');
                    element.classList.add('text-muted');
                }
            }
        }

        passwordInput.addEventListener('focus', () => {
            requirementsContainer.style.display = 'block';
        });

        passwordInput.addEventListener('input', () => {
            const val = passwordInput.value;
            
            const isLenValid = val.length >= 8;
            const isUpperValid = /[A-Z]/.test(val);
            const isLowerValid = /[a-z]/.test(val);
            const isNumValid = /[0-9]/.test(val);
            const isSpecialValid = /[^A-Za-z0-9]/.test(val);

            updateReq(reqs.len, isLenValid);
            updateReq(reqs.upper, isUpperValid);
            updateReq(reqs.lower, isLowerValid);
            updateReq(reqs.num, isNumValid);
            updateReq(reqs.special, isSpecialValid);
        });

        // Step 1: Verify OTP Handler
        verifyOtpBtn.addEventListener('click', async () => {
            const otp = otpInput.value.trim();
            alertContainer.innerHTML = '';

            if (!otp) {
                showAlert('OTP code is required!', 'danger');
                return;
            }

            if (otp.length !== 6 || !/^\d+$/.test(otp)) {
                showAlert('OTP code must be a 6-digit number!', 'danger');
                return;
            }

            verifyOtpBtn.disabled = true;
            verifyOtpBtn.innerHTML = '<span class="spinner-border spinner-border-sm me-2" role="status" aria-hidden="true"></span>Verifying OTP...';

            try {
                await apiFetch('/auth/verify-otp', {
                    method: 'POST',
                    body: { email, otp }
                });

                showAlert('OTP verified successfully! Please enter your new password.', 'success');
                
                // Lock OTP input and hide verification button
                otpInput.disabled = true;
                verifyOtpBtn.style.display = 'none';
                
                // Fade in password fields smoothly
                passwordSection.style.display = 'block';
                passwordSection.style.opacity = 0;
                let opacity = 0;
                const interval = setInterval(() => {
                    if (opacity >= 1) {
                        clearInterval(interval);
                    }
                    passwordSection.style.opacity = opacity;
                    opacity += 0.1;
                }, 30);

            } catch (err) {
                showAlert(err.message, 'danger');
                verifyOtpBtn.disabled = false;
                verifyOtpBtn.innerHTML = 'Verify OTP';
            }
        });

        // Step 2: Reset Password Form Handler
        form.addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const otp = otpInput.value.trim();
            const password = passwordInput.value;
            const confirmPassword = confirmInput.value;

            alertContainer.innerHTML = '';

            if (!otp || !password || !confirmPassword) {
                showAlert('All fields are required!', 'danger');
                return;
            }

            const isStrong = password.length >= 8 && 
                             /[A-Z]/.test(password) && 
                             /[a-z]/.test(password) && 
                             /[0-9]/.test(password) && 
                             /[^A-Za-z0-9]/.test(password);

            if (!isStrong) {
                showAlert('Password must meet all complexity requirements!', 'danger');
                return;
            }

            if (password !== confirmPassword) {
                showAlert('Passwords do not match!', 'danger');
                return;
            }

            resetPasswordBtn.disabled = true;
            resetPasswordBtn.innerHTML = '<span class="spinner-border spinner-border-sm me-2" role="status" aria-hidden="true"></span>Resetting password...';

            try {
                await apiFetch('/auth/reset-password', {
                    method: 'POST',
                    body: {
                        email: email,
                        otp: otp,
                        password: password,
                        confirm_password: confirmPassword
                    }
                });

                showAlert('Password updated successfully! Redirecting to login...', 'success');
                setTimeout(() => {
                    window.location.href = 'login.html';
                }, 2000);
            } catch (err) {
                showAlert(err.message, 'danger');
                resetPasswordBtn.disabled = false;
                resetPasswordBtn.innerHTML = 'Reset Password';
            }
        });

        function showAlert(message, type) {
            alertContainer.innerHTML = `
                <div class="alert alert-${type} alert-dismissible fade show" role="alert" style="border-radius: 12px; font-size: 0.9rem;">
                    ${message}
                    <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                </div>
            `;
        }
    });
</script>
</body>
</html>
