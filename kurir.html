<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta http-equiv="X-UA-Compatible" content="IE=edge" />
        <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
        <meta name="description" content="" />
        <meta name="author" content="" />
        <title>Couriers — myLaundry Admin</title>
        <link href="css/styles.css" rel="stylesheet" />
        <script src="https://use.fontawesome.com/releases/v6.3.0/js/all.js" crossorigin="anonymous"></script>
        <!-- Custom Web Components -->
        <script src="js/components.js" defer></script>
    </head>
    <body class="sb-nav-fixed">
    <admin-navbar></admin-navbar>
    <div id="layoutSidenav">
        <admin-sidebar></admin-sidebar>
            <div id="layoutSidenav_content">
                <main>
                    <div class="container-fluid px-4">
                    <h1 class="mt-4">Couriers</h1>
                        <div class="card mb-4">
                            <div class="card-header">
                                <i class="fas fa-chart-pie me-1"></i>
                                <span id="chartHeaderText">Total 14 deliveries dispatched and 11 orders picked up</span>
                            </div>
                             <div class="card-body d-flex justify-content-center align-items-center" style="height: 250px; position: relative;">
                                 <canvas id="myPieChart" style="max-height: 220px; max-width: 220px;"></canvas>
                             </div>
                            <div class="card-footer small text-muted">Last updated yesterday at 11:59 PM.</div>
                        </div>
                        <div class="card mb-4">
                            <div class="card-header">
                                <i class="fas fa-table me-1"></i>
                                Courier Delivery List
                            </div>
                            <div class="card-body">
                                <table id="datatablesSimple">
                                    <thead>
                                    <tr>
                                        <th>Courier ID</th>
                                        <th>Name</th>
                                        <th>Status</th>
                                        <th>Delivery Schedule</th>
                                        <th>Total</th>
                                    </tr>
                                    </thead>
                                    <tfoot>
                                    <tr>
                                        <th>Courier ID</th>
                                        <th>Name</th>
                                        <th>Status</th>
                                        <th>Delivery Schedule</th>
                                        <th>Total</th>
                                    </tr>
                                    </tfoot>
                                    <tbody id="couriersTableBody">
                                        <tr>
                                            <td colspan="5" class="text-center py-5 text-muted">
                                                <div class="d-flex flex-column align-items-center justify-content-center gap-2">
                                                    <div class="spinner-border text-primary spinner-border-sm" role="status">
                                                        <span class="visually-hidden">Loading...</span>
                                                    </div>
                                                    <span>Memuat data kurir...</span>
                                                </div>
                                            </td>
                                        </tr>
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div>
                </main>
                <admin-footer></admin-footer>
            </div>
        </div>
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js" crossorigin="anonymous"></script>
        <script src="js/scripts.js"></script>
        <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/2.8.0/Chart.min.js" crossorigin="anonymous"></script>
        <script src="https://cdn.jsdelivr.net/npm/simple-datatables@7.1.2/dist/umd/simple-datatables.min.js" crossorigin="anonymous"></script>
        <script src="js/api.js"></script>
        <script>
            let myPieChart = null;

            async function loadCouriers() {
                const tbody = document.getElementById('couriersTableBody');
                if (!tbody) return;

                try {
                    // Fetch couriers and orders in parallel
                    const [couriersRes, ordersRes] = await Promise.all([
                        apiFetch('/couriers/'),
                        apiFetch('/orders/')
                    ]);

                    if (!couriersRes || !couriersRes.success) {
                        throw new Error('Gagal mengambil data kurir.');
                    }

                    const couriers = couriersRes.data || [];
                    const orders = ordersRes.data || [];

                    // Aggregate courier stats from orders
                    const courierStats = {};
                    couriers.forEach(c => {
                        courierStats[c.id] = {
                            activeCount: 0,
                            status: 'Available',
                            latestSchedule: 'No Schedule'
                        };
                    });

                    orders.forEach(order => {
                        if (order.courier && order.courier.id && courierStats[order.courier.id]) {
                            const orderStatus = (order.status || '').toLowerCase();
                            // If order is active
                            if (orderStatus !== 'done' && orderStatus !== 'completed' && orderStatus !== 'cancelled') {
                                courierStats[order.courier.id].activeCount++;
                                
                                // Determine courier status
                                if (orderStatus === 'courier en route' || orderStatus === 'arrived') {
                                    courierStats[order.courier.id].status = 'Delivering';
                                } else if (orderStatus === 'awaiting payment' || orderStatus === 'pending') {
                                    courierStats[order.courier.id].status = 'Picking Up';
                                } else {
                                    courierStats[order.courier.id].status = 'Active';
                                }

                                // Update schedule with order created date
                                const dateObj = new Date(order.created_at);
                                const options = { month: '2-digit', day: '2-digit', year: 'numeric', hour: '2-digit', minute: '2-digit', hour12: false };
                                courierStats[order.courier.id].latestSchedule = dateObj.toLocaleDateString('en-GB', options).replace(',', '');
                            }
                        }
                    });

                    tbody.innerHTML = '';
                    if (couriers.length > 0) {
                        couriers.forEach(courier => {
                            const stats = courierStats[courier.id] || { activeCount: 0, status: 'Available', latestSchedule: 'No Schedule' };
                            const row = document.createElement('tr');
                            
                            let badgeClass = 'status-kurir-inactive';
                            let statusLabel = stats.status;
                            if (stats.status === 'Available' || stats.status === 'Active') {
                                badgeClass = 'status-kurir-available';
                                statusLabel = 'Available';
                            } else if (stats.status === 'Picking Up') {
                                badgeClass = 'status-kurir-picking';
                            } else if (stats.status === 'Delivering') {
                                badgeClass = 'status-kurir-delivering';
                            }

                            row.innerHTML = `
                                <td>#${courier.id}</td>
                                <td>
                                    ${courier.username} <br> <small class="text-muted">${courier.email}</small>
                                </td>
                                <td><span class="${badgeClass}">${statusLabel}</span></td>
                                <td>${stats.latestSchedule}</td>
                                <td>${stats.activeCount}</td>
                            `;
                            tbody.appendChild(row);
                        });

                        // Draw Pie Chart
                        const availableTotal = couriers.filter(c => courierStats[c.id].status === 'Available' || courierStats[c.id].status === 'Active').length;
                        const busyTotal = couriers.length - availableTotal;

                        updatePieChart(availableTotal, busyTotal);

                        // Update description card header
                        const chartHeaderText = document.getElementById('chartHeaderText');
                        if (chartHeaderText) {
                            chartHeaderText.textContent = `Total ${busyTotal} kurir bertugas dan ${availableTotal} kurir bersiap (tersedia)`;
                        }
                    } else {
                        tbody.innerHTML = `
                            <tr>
                                <td colspan="5" class="text-center py-5 text-muted">
                                    <div class="d-flex flex-column align-items-center justify-content-center gap-2">
                                        <i class="fas fa-truck-moving fa-3x mb-2" style="color: #dee2e6;"></i>
                                        <h5 class="fw-bold" style="color: #6c757d;">Belum Ada Kurir</h5>
                                        <p class="text-muted small mb-0">Kurir yang terdaftar di sistem akan muncul di sini.</p>
                                    </div>
                                </td>
                            </tr>
                        `;
                        updatePieChart(0, 0);
                    }

                    // Initialize Simple DataTable
                    const datatablesSimple = document.getElementById('datatablesSimple');
                    if (datatablesSimple && !datatablesSimple.classList.contains('dataTable-table')) {
                        new simpleDatatables.DataTable(datatablesSimple);
                    }

                } catch (error) {
                    console.error('Error loading couriers:', error);
                    tbody.innerHTML = `
                        <tr>
                            <td colspan="5" class="text-center py-5 text-danger">
                                <div class="d-flex flex-column align-items-center justify-content-center gap-2">
                                    <i class="fas fa-exclamation-circle fa-3x mb-2" style="color: #dc3545;"></i>
                                    <h5 class="fw-bold">Gagal Memuat Data</h5>
                                    <p class="small mb-0">${error.message || 'Koneksi ke server terputus. Silakan coba lagi.'}</p>
                                    <button onclick="loadCouriers()" class="btn btn-outline-danger btn-sm mt-2">Coba Lagi</button>
                                </div>
                            </td>
                        </tr>
                    `;
                }
            }

            function updatePieChart(available, busy) {
                const ctx = document.getElementById("myPieChart");
                if (!ctx) return;

                if (myPieChart) {
                    myPieChart.destroy();
                }

                myPieChart = new Chart(ctx, {
                    type: 'doughnut',
                    data: {
                        labels: ["Tersedia (Available)", "Bertugas (Busy)"],
                        datasets: [{
                            data: [available, busy],
                            backgroundColor: ['#10b981', '#f59e0b'], // Soft Green and Soft Amber
                            borderWidth: 0
                        }],
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        cutoutPercentage: 75,
                        legend: {
                            position: 'bottom',
                            labels: {
                                boxWidth: 12,
                                fontFamily: 'Inter, sans-serif',
                                fontSize: 11
                            }
                        }
                    }
                });
            }

            window.addEventListener('DOMContentLoaded', loadCouriers);
        </script>
    </body>
</html>
