<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <meta name="description" content="" />
    <meta name="author" content="" />
    <title>Settings — myLaundry Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/simple-datatables@7.1.2/dist/style.min.css" rel="stylesheet" />
    <link href="css/styles.css" rel="stylesheet" />
    <script src="https://use.fontawesome.com/releases/v6.3.0/js/all.js" crossorigin="anonymous"></script>
    <!-- Custom Web Components -->
    <script src="js/components.js" defer></script>
</head>
<body class="sb-nav-fixed">
<admin-navbar></admin-navbar>
<div id="layoutSidenav">
    <admin-sidebar></admin-sidebar>
    <div id="layoutSidenav_content">
        <main>
            <div class="container-fluid px-4">
                <div class="wadah">
                    <h4 class="mt-4 mb-4">
                        <i class="fas fa-cog me-2" style="color: #0007B0;"></i>System Settings
                    </h4>
                    
                    <div class="row">
                        <!-- Left Column: Profile & Shop Branding -->
                        <div class="col-lg-5 col-md-6 mb-4">
                            <!-- Admin Profile Card -->
                            <div class="bagian-gambar mb-4">
                                <h5 class="mb-3 text-start" style="color: #0B1739; font-weight: 650; font-size: 1.15rem;">Admin Profile</h5>
                                <img src="assets/img/gambar-satu.jpg" alt="Admin Avatar" class="img-fluid rounded-circle mb-3" id="preview-avatar" style="width: 120px; height: 120px; object-fit: cover; border: 4px solid #C2E9F9;">
                                <button class="informasi-nama-gambar btn btn-secondary w-100 text-truncate d-flex align-items-center justify-content-center mx-auto mb-2" id="file-name-btn" style="max-width:80%; overflow:hidden;">
                                    admin-avatar.jpg
                                </button>
                                <label class="button-unggah-gambar btn btn-primary" for="avatar-upload" style="cursor:pointer; font-size: 0.9rem; padding: 6px 16px;">
                                    Upload Avatar
                                    <i class="fas fa-camera ms-1"></i>
                                    <input type="file" id="avatar-upload" accept="image/jpeg,image/png" style="display:none;">
                                </label>
                            </div>

                            <!-- Shop Information Form Card -->
                            <div class="form-sec">
                                <div class="bagian-satu">
                                    <h4>Shop Information</h4>
                                    <div class="mb-3">
                                        <label for="shop-name" class="form-label">Shop Name</label>
                                        <input type="text" class="form-control" id="shop-name" value="myLaundry Telkom University">
                                    </div>
                                    <div class="mb-3">
                                        <label for="shop-phone" class="form-label">Phone Number</label>
                                        <input type="text" class="form-control" id="shop-phone" value="+62 812-3456-7890">
                                    </div>
                                    <div class="mb-3">
                                        <label for="shop-address" class="form-label">Address</label>
                                        <textarea class="form-control" id="shop-address" rows="3" style="resize: none;">Sukabirus No. 42, Dayeuhkolot, Bandung</textarea>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <!-- Right Column: Security & Operational Rules -->
                        <div class="col-lg-7 col-md-6 mb-4">
                            <!-- Operational Settings Card -->
                            <div class="form-sec mb-4">
                                <div class="bagian-dua">
                                    <h4>Operational Rules</h4>
                                    <div class="row">
                                        <div class="col-sm-6 mb-3">
                                            <label for="tax-rate" class="form-label">Tax Rate (%)</label>
                                            <input type="number" class="form-control" id="tax-rate" value="10" min="0" max="100">
                                        </div>
                                        <div class="col-sm-6 mb-3">
                                            <label for="service-charge" class="form-label">Service Fee (Rp)</label>
                                            <input type="number" class="form-control" id="service-charge" value="2000" min="0">
                                        </div>
                                    </div>
                                    <div class="row">
                                        <div class="col-sm-6 mb-3">
                                            <label for="min-order" class="form-label">Min. Order Amount (Rp)</label>
                                            <input type="number" class="form-control" id="min-order" value="10000" min="0">
                                        </div>
                                        <div class="col-sm-6 mb-3">
                                            <label for="currency-format" class="form-label">Currency Symbol</label>
                                            <input type="text" class="form-control" id="currency-format" value="Rp" readonly>
                                        </div>
                                    </div>
                                </div>
                            </div>

                            <!-- Security Settings Card -->
                            <div class="form-sec mb-4">
                                <div class="bagian-tiga">
                                    <h4>Security & Password</h4>
                                    <div class="mb-3">
                                        <label for="current-password" class="form-label">Current Password</label>
                                        <input type="password" class="form-control" id="current-password" placeholder="••••••••">
                                    </div>
                                    <div class="row">
                                        <div class="col-sm-6 mb-3">
                                            <label for="new-password" class="form-label">New Password</label>
                                            <input type="password" class="form-control" id="new-password" placeholder="Min. 8 characters">
                                        </div>
                                        <div class="col-sm-6 mb-3">
                                            <label for="confirm-password" class="form-label">Confirm New Password</label>
                                            <input type="password" class="form-control" id="confirm-password" placeholder="Repeat new password">
                                        </div>
                                    </div>
                                </div>
                            </div>

                            <!-- Action Buttons -->
                            <div class="action-buttons d-flex justify-content-end gap-2 mt-4">
                                <a href="dashboard.html" type="button" class="button-batal btn btn-danger">
                                    <i class="fas fa-times me-1"></i>Cancel
                                </a>
                                <button type="button" class="button-kirim btn btn-primary" id="save-settings-btn">
                                    <i class="fas fa-save me-1"></i>Save Settings
                                </button>
                            </div>
                        </div>
                    </div>

                </div>
            </div>
        </main>
        <admin-footer></admin-footer>
    </div>
</div>

<script>
    // Handle image upload and preview
    document.getElementById('avatar-upload').addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (file) {
            document.getElementById('file-name-btn').textContent = file.name;
            const reader = new FileReader();
            reader.onload = function(event) {
                document.getElementById('preview-avatar').src = event.target.result;
            };
            reader.readAsDataURL(file);
        }
    });

    // Mock settings saving notification
    document.getElementById('save-settings-btn').addEventListener('click', function() {
        alert('Settings saved successfully!');
        window.location.href = 'dashboard.html';
    });
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js" crossorigin="anonymous"></script>
<script src="js/scripts.js"></script>
</body>
</html>
